# font names for the official GitHub font
# font_family      Monaspace Neon Var
# italic_font      Monaspace Neon Var Italic
# italic_font      Monaspace Neon Var
# bold_font        Monaspace Neon Var Bold
# bold_italic_font Monaspace Neon Var Bold Italic


# (pkg: otf-monaspace-nerd) monaspace-nerd renames it to "Monaspice" names
font_family      Monaspace Neon NF
# font_family      MonaspiceNe Nerd Font Mono
italic_font      Monaspace Neon NF
# italic_font      MonaspiceNe Nerd Font Mono
bold_font        Monaspace Neon NF
# bold_font        MonaspiceNe Nerd Font Mono
bold_italic_font Monaspace Neon NF
# bold_italic_font MonaspiceNe Nerd Font Mono

# (pkg: otf-monaspace-nerd) packaged under 1 family name
font_features Monaspace Neon NF    liga calt ss01 ss02 ss03 ss04 ss05 ss08

modify_font underline_thickness 50%
# modify_font cell_height +2px
# modify_font baseline +2px
# modify_font underline_position 2px

cursor_shape beam
cursor_beam_thickness 1.5
cursor_shape_unfocused unchanged

# cursor_trail 1
# cursor_trail_decay 0.2 0.3

scrollbar_interactive yes
scrollbar_jump_on_click no
scrollbar_width 1.5
scrollbar hovered
scrollbar_gap 0.0

strip_trailing_spaces smart


underline_style thin-sparse
# underline_exclusion 5px # not working

# font_features MonaspiceNe Nerd Font Mono    calt ss01 ss02 ss03 ss04 ss05 ss08

# official github font family syntax
# font_features MonaspaceNeonVar		       calt ss01 ss02 ss03 ss04 ss05 ss08
# font_features MonaspaceNeonVar-Italic      calt ss01 ss02 ss03 ss04 ss05 ss08
# font_features MonaspaceNeonVar-Bold        calt ss01 ss02 ss03 ss04 ss05 ss08
# font_features MonaspaceNeonVar-BoldItalic  calt ss01 ss02 ss03 ss04 ss05 ss08

font_size 12.0
# modify_font cell_height +6px
adjust_column_width 1


background_opacity 1.0

confirm_os_window_close 0

enable_audio_bell no

# tab bar
tab_bar_style powerline
tab_powerline_style angled
tab_title_template "{title}"

clear_all_mouse_actions yes
mouse_map ctrl+left release grabbed,ungrabbed mouse_handle_click link
mouse_map left doublepress ungrabbed mouse_selection word
mouse_map left triplepress ungrabbed mouse_selection line
mouse_map left press ungrabbed mouse_selection normal
mouse_map alt+left press ungrabbed mouse_selection rectangle
mouse_map shift+left press ungrabbed mouse_selection extend
mouse_map left press ungrabbed mouse_selection normal

map ctrl+h show_last_command_output
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0
map ctrl+o open_url_with_hints
map ctrl+shift+f1 show_kitty_doc overview

map ctrl+up scroll_line_up
map ctrl+down scroll_line_down
map ctrl+page_up scroll_page_up
map ctrl+page_down scroll_page_down
map ctrl+home scroll_home
map ctrl+end scroll_end


map ctrl+shift+f3 command_palette


enable_audio_bell no
